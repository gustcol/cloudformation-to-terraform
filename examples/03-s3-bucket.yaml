AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Bucket with Security Best Practices

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket (must be globally unique)

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production

  EnableVersioning:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'

  RetentionDays:
    Type: Number
    Default: 90
    Description: Days to retain objects before transitioning to Glacier

Conditions:
  IsProduction: !Equals [!Ref Environment, production]
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, 'true']

Resources:
  # KMS Key for bucket encryption
  BucketKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS key for ${BucketName} encryption"
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"
          - Sid: Allow S3 to use the key
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  BucketKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${BucketName}-key"
      TargetKeyId: !Ref BucketKMSKey

  # Access Logs Bucket
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketName}-logs"
      AccessControl: LogDeliveryWrite
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub "${BucketName}-logs"
        - Key: Environment
          Value: !Ref Environment

  # Main S3 Bucket
  MainBucket:
    Type: AWS::S3::Bucket
    DependsOn: LogsBucket
    Properties:
      BucketName: !Ref BucketName
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt BucketKMSKey.Arn
            BucketKeyEnabled: true
      VersioningConfiguration:
        Status: !If [EnableVersioningCondition, Enabled, Suspended]
      LoggingConfiguration:
        DestinationBucketName: !Ref LogsBucket
        LogFilePrefix: access-logs/
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
          - Id: TransitionToGlacier
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: !Ref RetentionDays
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: DeleteOldVersions
            Status: !If [EnableVersioningCondition, Enabled, Disabled]
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - !If [IsProduction, "https://example.com", "*"]
            MaxAge: 3000
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: !Ref Environment

  # Bucket Policy
  MainBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MainBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: EnforceHTTPS
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt MainBucket.Arn
              - !Sub "${MainBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: 'false'
          - Sid: DenyIncorrectEncryptionHeader
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub "${MainBucket.Arn}/*"
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref MainBucket
    Export:
      Name: !Sub "${Environment}-MainBucketName"

  BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt MainBucket.Arn
    Export:
      Name: !Sub "${Environment}-MainBucketArn"

  BucketDomainName:
    Description: Domain name of the S3 bucket
    Value: !GetAtt MainBucket.DomainName
    Export:
      Name: !Sub "${Environment}-MainBucketDomainName"

  KMSKeyArn:
    Description: ARN of the KMS key
    Value: !GetAtt BucketKMSKey.Arn
    Export:
      Name: !Sub "${Environment}-BucketKMSKeyArn"

  LogsBucketName:
    Description: Name of the logs bucket
    Value: !Ref LogsBucket
    Export:
      Name: !Sub "${Environment}-LogsBucketName"
