AWSTemplateFormatVersion: '2010-09-09'
Description: |
  INTENTIONALLY INSECURE TEMPLATE FOR TESTING SECURITY ANALYSIS
  DO NOT USE IN PRODUCTION - Contains security vulnerabilities for testing

# This template contains intentional security issues to test the security analyzer

Resources:
  # Insecure S3 Bucket - Public Access
  InsecurePublicBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: insecure-public-bucket-test
      AccessControl: PublicRead
      # Missing: PublicAccessBlockConfiguration
      # Missing: BucketEncryption
      # Missing: VersioningConfiguration
      # Missing: LoggingConfiguration
      Tags:
        - Key: Purpose
          Value: SecurityTesting

  # Insecure EC2 Instance
  InsecureEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: m3.large  # Outdated instance family
      ImageId: ami-12345678
      # Missing: MetadataOptions (IMDSv2 not enforced)
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 50
            VolumeType: gp2
            Encrypted: false  # EBS not encrypted
      Tags:
        - Key: Name
          Value: insecure-instance

  # Insecure Security Group - SSH Open to World
  InsecureSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Insecure security group
      GroupName: insecure-sg
      SecurityGroupIngress:
        # SSH open to the world - CRITICAL
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        # RDP open to the world - CRITICAL
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: 0.0.0.0/0
        # All ports open from internal - HIGH
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: insecure-sg

  # Insecure RDS Instance
  InsecureRDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: insecure-db
      DBInstanceClass: db.m3.medium  # Outdated instance class
      Engine: mysql
      EngineVersion: '5.7'
      MasterUsername: admin
      MasterUserPassword: password123  # Hardcoded password
      AllocatedStorage: 20
      StorageType: standard  # Magnetic storage (slow)
      StorageEncrypted: false  # Not encrypted
      PubliclyAccessible: true  # Publicly accessible
      BackupRetentionPeriod: 0  # No backups
      MultiAZ: false  # No high availability
      DeletionProtection: false  # No deletion protection
      # Missing: EnablePerformanceInsights
      Tags:
        - Key: Name
          Value: insecure-db

  # Overly Permissive IAM Role
  OverlyPermissiveRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: overly-permissive-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Full admin access - CRITICAL
              - Effect: Allow
                Action: "*"
                Resource: "*"

  # IAM Policy with Wildcard Actions
  WildcardPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: wildcard-policy
      Roles:
        - !Ref OverlyPermissiveRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Wildcard actions - HIGH
          - Effect: Allow
            Action:
              - s3:*
              - ec2:*
            Resource: "*"

  # Insecure Lambda Function
  InsecureLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: insecure-lambda
      Runtime: python3.9
      Handler: index.handler
      MemorySize: 128  # Minimum memory
      Timeout: 3  # Default timeout
      # Missing: TracingConfig (X-Ray)
      # Missing: VpcConfig
      Role: !GetAtt OverlyPermissiveRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {'statusCode': 200}
      Tags:
        - Key: Name
          Value: insecure-lambda

  # DynamoDB Table without Encryption
  InsecureDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: insecure-table
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      # Missing: SSESpecification (encryption)
      # Missing: PointInTimeRecoverySpecification
      Tags:
        - Key: Name
          Value: insecure-table

  # KMS Key without Rotation
  InsecureKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key without rotation
      EnableKeyRotation: false  # Rotation disabled
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"

  # SNS Topic without Encryption
  InsecureSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: insecure-topic
      # Missing: KmsMasterKeyId (encryption)
      Tags:
        - Key: Name
          Value: insecure-topic

  # SQS Queue without Encryption
  InsecureSQSQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: insecure-queue
      # Missing: KmsMasterKeyId (encryption)
      Tags:
        - Key: Name
          Value: insecure-queue

  # CloudWatch Log Group without Encryption
  InsecureLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /insecure/logs
      RetentionInDays: 7
      # Missing: KmsKeyId (encryption)

  # ECS Cluster without Container Insights
  InsecureECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: insecure-cluster
      # Missing: ClusterSettings (Container Insights)
      Tags:
        - Key: Name
          Value: insecure-cluster

  # ECR Repository without Image Scanning
  InsecureECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: insecure-repo
      ImageTagMutability: MUTABLE  # Tags can be overwritten
      # Missing: ImageScanningConfiguration (scan on push)
      Tags:
        - Key: Name
          Value: insecure-repo

Outputs:
  Message:
    Description: Warning message
    Value: "This template contains intentional security vulnerabilities for testing purposes only!"
